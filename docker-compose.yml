services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: ai-website-cloner:latest
    container_name: ai-website-cloner
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ai-website-cloner:dev
    container_name: ai-website-cloner-dev
    restart: unless-stopped
    ports:
      - "${DEV_PORT:-3001}:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - CLONE_WORKER_URL=http://clone-worker:3100
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - clone-worker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  clone-worker:
    build:
      context: ./services/clone-worker
      dockerfile: Dockerfile
    image: loclone-clone-worker:latest
    container_name: loclone-clone-worker
    restart: unless-stopped
    ports:
      - "${CLONE_WORKER_PORT:-3100}:3100"
    environment:
      - LOCLONE_ROOT=/loclone
      - CLONE_WORKER_PORT=3100
      - WORKER_BROWSER_POOL=2
      - WORKER_HEADLESS=true
    volumes:
      - .:/loclone
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
