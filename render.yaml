# Loclone Clone Worker — Render Blueprint
# Dashboard: https://dashboard.render.com/blueprints
services:
  - type: web
    name: loclone-clone-worker
    runtime: docker
    plan: standard
    region: singapore
    branch: master
    repo: https://github.com/shinkang888-code/loclone
    dockerfilePath: ./services/clone-worker/Dockerfile
    dockerContext: ./services/clone-worker
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOCLONE_ROOT
        value: /tmp/loclone
      - key: WORKER_BROWSER_POOL
        value: "1"
      - key: WORKER_BROWSER_PER_JOB
        value: "true"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=512"
      - key: WORKER_HEADLESS
        value: "true"
      - key: WORKER_MINIMAL_RENDER
        value: "1"
      - key: BLOB_READ_WRITE_TOKEN
        sync: false
